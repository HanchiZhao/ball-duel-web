<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ball Duel Web | 小球乱斗网页版</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page-shell">
    <section class="hero-card">
      <div>
        <p class="eyebrow">HTML5 Canvas · GitHub Pages Ready</p>
        <h1>Ball Duel Web 小球乱斗</h1>
        <p class="subtitle">第五轮打磨版：32 个角色、多人阵营、主题特效、随机阵容、一键开始、重开同阵容。</p>
      </div>
      <div class="status-pill" id="engineStatus">Ready</div>
    </section>

    <section class="layout">
      <aside class="control-card">
        <div class="panel-heading">
          <div>
            <h2>开局设置</h2>
            <p>选择模式、阵营和角色；也可以一键随机开战。</p>
          </div>
          <span class="role-count" id="roleCountText">32 roles</span>
        </div>

        <div class="quick-actions">
          <button id="quickStartBtn" class="primary big">一键开始</button>
          <button id="randomBtn">随机阵容</button>
          <button id="sameBtn">重开同阵容</button>
        </div>

        <label class="field compact-field">
          <span>模式</span>
          <select id="modeSelect">
            <option value="ffa">自由混战 Free-for-all</option>
            <option value="teams">多人阵营 Team Battle</option>
          </select>
        </label>

        <div id="ffaPanel" class="mode-panel">
          <label class="field compact-field">
            <span>小球数量</span>
            <input id="ffaCount" type="number" min="2" max="12" value="6" />
          </label>
          <div id="ffaRoles" class="role-list"></div>
        </div>

        <div id="teamPanel" class="mode-panel hidden">
          <label class="field compact-field">
            <span>阵营数量</span>
            <input id="teamCount" type="number" min="2" max="6" value="2" />
          </label>
          <div id="teamEditors" class="team-editors"></div>
        </div>

        <div class="button-row">
          <button id="startBtn" class="primary">开始当前阵容</button>
          <button id="pauseBtn">暂停</button>
          <button id="resetBtn">清空场地</button>
        </div>

        <div class="help-box">
          <strong>本轮优化</strong>
          <p>新增主题化冲击、回血、撞墙粒子；特效绘制在小球下层，尽量不遮挡血量数字。</p>
          <p>UI 增加角色卡片说明、随机阵容、一键开始、重开同阵容。手机端仍可直接打开网页游玩。</p>
        </div>
      </aside>

      <section class="game-card">
        <canvas id="gameCanvas" width="980" height="760" aria-label="Ball Duel game canvas"></canvas>
        <div class="game-footer">
          <div id="winnerText">请选择模式和角色，然后开始。</div>
          <div id="timeText">00.0s</div>
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
